services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shredtrainer
      POSTGRES_USER: shredtrainer
      POSTGRES_PASSWORD: shredtrainer
    ports:
      # 5433 on the host: a native Postgres already occupies 5432 on this machine
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shredtrainer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
